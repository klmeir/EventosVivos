<div class="container d-flex justify-content-center align-items-center vh-100">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="card p-4 shadow-sm" style="width: 350px;">
    <h2 class="h4 mb-3 text-center">Login</h2>
    
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input 
        id="username" 
        formControlName="username" 
        type="text" 
        class="form-control" 
        autocomplete="username" 
      />
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input 
        id="password" 
        formControlName="password" 
        type="password" 
        class="form-control" 
        autocomplete="current-password" 
      />
    </div>
    
    <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid || loading()">
      @if (loading()) {
        <span class="spinner-border spinner-border-sm" role="status"></span> Processing...
      } @else {
        Sign In
      }
    </button>
    
    @if (error()) {
      <div class="alert alert-danger mt-3 p-2 text-center" role="alert">
        {{ error() }}
      </div>
    }
  </form>
</div>
