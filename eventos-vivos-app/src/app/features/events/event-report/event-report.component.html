<div class="container py-4">  
  <div class="mb-3">
    <a routerLink="/events" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> &larr; Back to Event List
    </a>
  </div>

  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/events">Events</a></li>
      <li class="breadcrumb-item active">Event Report</li>
    </ol>
  </nav>
  
  @if (report(); as r) {
    <div class="card shadow">
      <div class="card-header bg-primary text-white"><h3>Occupancy Report</h3></div>
      <div class="card-body">
        <div class="row text-center">
          <div class="col">
            <h5>Sold</h5><p class="h2">{{ r.totalTicketsSold }}</p>
          </div>
          <div class="col">
            <h5>Available</h5><p class="h2">{{ r.totalTicketsAvailable }}</p>
          </div>
          <div class="col">
            <h5>Occupancy</h5><p class="h2">{{ r.occupancyPercentage }}%</p>
          </div>
          <div class="col">
            <h5>Revenue</h5><p class="h2">${{ r.totalRevenue | number:'1.2-2' }}</p>
          </div>
        </div>
        <div class="mt-3"><strong>Status:</strong> <span class="badge bg-info">{{ r.status }}</span></div>
      </div>
    </div>
  }
</div>
